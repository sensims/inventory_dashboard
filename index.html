<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>保管账库存管理看板（Excel上传版）</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #eef2f7;
  --card: #ffffff;
  --card-hover: #f5f8fc;
  --border: #d0dbe8;
  --accent: #1565c0;
  --accent2: #0d47a1;
  --accent-light: #e3f2fd;
  --text: #1a2332;
  --text2: #5a6f84;
  --red: #c62828;
  --orange: #e65100;
  --yellow: #f9a825;
  --green: #2e7d32;
  --blue: #1565c0;
  --header-bg: linear-gradient(135deg,#0d47a1,#1565c0,#1976d2);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:'Segoe UI','Microsoft YaHei',sans-serif; min-height:100vh; }

/* Upload Area */
.upload-area {
  max-width: 600px;
  margin: 80px auto;
  padding: 40px;
  background: var(--card);
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,.1);
  text-align: center;
}
.upload-area h2 { color:var(--accent2); margin-bottom:8px; font-size:24px; }
.upload-area .subtitle { color:var(--text2); margin-bottom:20px; font-size:13px; }
.upload-step { background:#f5f8fc; border-radius:10px; padding:16px; margin-bottom:12px; text-align:left; }
.upload-step h4 { font-size:13px; color:var(--accent); margin-bottom:6px; }
.upload-step input[type="file"] { font-size:12px; cursor:pointer; }
.upload-step .file-name { font-size:11px; color:var(--green); margin-top:4px; }
.btn-generate {
  background:var(--accent); color:#fff; border:none; border-radius:8px;
  padding:12px 32px; font-size:15px; cursor:pointer; margin-top:16px;
  transition:background .15s; font-weight:600;
}
.btn-generate:hover { background:var(--accent2); }
.btn-generate:disabled { background:#ccc; cursor:not-allowed; }
#progress { margin-top:12px; font-size:12px; color:var(--text2); }

/* Dashboard styles (same as original) */
.header { background:var(--header-bg); padding:18px 32px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 8px rgba(13,71,161,.25); }
.header h1 { font-size:22px; font-weight:700; color:#fff; }
.header .date { color:rgba(255,255,255,.8); font-size:13px; }
.filters { background:var(--card); margin:16px 24px; border-radius:10px; padding:14px 18px; display:flex; gap:16px; flex-wrap:wrap; align-items:center; border:1px solid var(--border); box-shadow:0 1px 4px rgba(0,0,0,.04); }
.filter-group { display:flex; align-items:center; gap:8px; }
.filter-group label { font-size:13px; color:var(--text2); white-space:nowrap; font-weight:600; }
.filter-group select { background:#fff; color:var(--text); border:1px solid var(--border); border-radius:6px; padding:5px 10px; font-size:13px; cursor:pointer; min-width:160px; }
.filter-group select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(21,101,192,.15); }
.chip-group { display:flex; gap:5px; flex-wrap:wrap; }
.chip { padding:4px 12px; border-radius:16px; font-size:12px; cursor:pointer; border:1px solid var(--border); background:#fff; color:var(--text2); transition:all .2s; user-select:none; }
.chip.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.chip:hover { border-color:var(--accent); color:var(--accent); }
.chip.active:hover { color:#fff; }
.stats-row { display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin:0 24px 16px; }
.stat-card { background:var(--card); border-radius:10px; padding:16px; border:1px solid var(--border); text-align:center; transition:transform .15s,box-shadow .15s; box-shadow:0 1px 4px rgba(0,0,0,.04); }
.stat-card:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.08); }
.stat-card .value { font-size:26px; font-weight:700; margin-bottom:4px; }
.stat-card .label { font-size:12px; color:var(--text2); }
.charts-row { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:0 24px 16px; }
.chart-card { background:var(--card); border-radius:10px; padding:16px; border:1px solid var(--border); box-shadow:0 1px 4px rgba(0,0,0,.04); cursor:pointer; transition:box-shadow .15s; }
.chart-card:hover { box-shadow:0 4px 12px rgba(13,71,161,.15); }
.chart-card h3 { font-size:14px; margin-bottom:4px; color:var(--text2); }
.chart-card .chart-hint { font-size:11px; color:#90a4ae; margin-bottom:8px; }
.chart-container { position:relative; height:320px; }
.table-section { margin:0 24px 24px; background:var(--card); border-radius:10px; border:1px solid var(--border); overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.04); }
.table-header { padding:12px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); flex-wrap:wrap; gap:8px; }
.table-header h3 { font-size:14px; color:var(--accent2); }
.table-header .count { font-size:12px; color:var(--text2); }
.table-wrap { overflow-x:auto; max-height:520px; overflow-y:auto; }
table { width:100%; border-collapse:collapse; font-size:12px; }
thead th { background:#e8eef5; position:sticky; top:0; z-index:2; padding:8px 10px; text-align:left; color:var(--text2); font-weight:600; white-space:nowrap; border-bottom:2px solid var(--accent); cursor:pointer; user-select:none; transition:background .15s; position:relative; }
thead th:hover { background:#dce6f2; color:var(--accent); }
thead th .sort-arrow { font-size:10px; margin-left:3px; opacity:.4; }
thead th.sort-asc .sort-arrow, thead th.sort-desc .sort-arrow { opacity:1; color:var(--accent); }
thead th .resize-handle { position:absolute; right:0; top:0; bottom:0; width:5px; cursor:col-resize; z-index:3; }
thead th .resize-handle:hover, thead th .resize-handle.resizing { background:var(--accent); opacity:.5; }
table { table-layout:fixed; }
th, td { overflow:hidden; text-overflow:ellipsis; }
tbody td { padding:6px 10px; border-bottom:1px solid #e8eef5; white-space:nowrap; }
tbody tr:hover { background:var(--accent-light); }
.badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; display:inline-block; }
.badge-expired { background:#ffebee; color:#c62828; }
.badge-1m { background:#ffebee; color:#c62828; }
.badge-1-3m { background:#fff8e1; color:#e65100; }
.badge-3-6m { background:#e3f2fd; color:#1565c0; }
.badge-6m { background:#e8f5e9; color:#2e7d32; }
.badge-storage-1m { background:#e8f5e9; color:#2e7d32; }
.badge-storage-1-3m { background:#e3f2fd; color:#1565c0; }
.badge-storage-3-6m { background:#fff8e1; color:#e65100; }
.badge-storage-6m { background:#ffebee; color:#c62828; }
.search-input { background:#fff; color:var(--text); border:1px solid var(--border); border-radius:6px; padding:5px 10px; font-size:12px; width:180px; }
.search-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px rgba(21,101,192,.15); }
.export-btn { background:var(--accent); color:#fff; border:none; border-radius:6px; padding:6px 14px; font-size:12px; cursor:pointer; transition:background .15s; }
.export-btn:hover { background:var(--accent2); }
.price-ref { font-weight:600; color:var(--accent2); }
.summary-row td { background:#e3f2fd !important; font-weight:700; color:var(--accent2); position:sticky; bottom:0; z-index:1; border-top:2px solid var(--accent); }
.summary-row:hover td { background:#e3f2fd !important; }
</style>
</head>
<body>

<!-- Upload Area -->
<div id="uploadArea" class="upload-area">
  <h2>💊 保管账库存管理看板</h2>
  <p class="subtitle">上传Excel文件，自动生成库存分析看板</p>
  
  <div class="upload-step">
    <h4>上传保管账库存Excel文件</h4>
    <input type="file" id="fileInput" accept=".xlsx,.xls" onchange="onFileSelected('fileInput', 'file1Name')">
    <div id="file1Name" class="file-name"></div>
  </div>
  
  <button class="btn-generate" id="generateBtn" onclick="processFiles()">📊 生成看板</button>
  <div id="progress"></div>
</div>

<!-- Dashboard (hidden initially) -->
<div id="dashboard" style="display:none;">
  <div class="header">
    <h1>💊 保管账库存管理看板</h1>
    <div class="date" id="headerDate">数据加载中...</div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>保管账：</label>
      <select id="storeFilter"><option value="all">全部</option></select>
    </div>
    <div class="filter-group">
      <label>距离失效天数：</label>
      <div class="chip-group" id="expireChips">
        <span class="chip active" data-val="all">全部</span>
        <span class="chip" data-val="已过期">已过期</span>
        <span class="chip" data-val="1个月内">≤1个月</span>
        <span class="chip" data-val="1-3个月">1-3个月</span>
        <span class="chip" data-val="3-6个月">3-6个月</span>
        <span class="chip" data-val="6个月以上">6个月+</span>
      </div>
    </div>
    <div class="filter-group">
      <label>在库天数：</label>
      <div class="chip-group" id="storageChips">
        <span class="chip active" data-val="all">全部</span>
        <span class="chip" data-val="1个月内">≤1个月</span>
        <span class="chip" data-val="1-3个月">1-3个月</span>
        <span class="chip" data-val="3-6个月">3-6个月</span>
        <span class="chip" data-val="6个月以上">6个月+</span>
      </div>
    </div>
    <div class="filter-group">
      <label>产品部门：</label>
      <select id="deptFilter"><option value="all">全部</option></select>
    </div>
    <div class="filter-group">
      <label>计划员：</label>
      <select id="plannerFilter"><option value="all">全部</option></select>
    </div>
    <div class="filter-group">
      <label>采购员：</label>
      <select id="buyerFilter"><option value="all">全部</option></select>
    </div>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="charts-row">
    <div class="chart-card">
      <h3>📉 距离失效天数分布</h3>
      <div class="chart-hint">点击柱状图可筛选下方明细</div>
      <div class="chart-container"><canvas id="expireChart"></canvas></div>
    </div>
    <div class="chart-card">
      <h3>📊 在库天数分布</h3>
      <div class="chart-hint">点击柱状图可筛选下方明细</div>
      <div class="chart-container"><canvas id="storageChart"></canvas></div>
    </div>
  </div>

  <div class="table-section">
    <div class="table-header">
      <h3>📋 库存明细</h3>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
        <span class="count" id="tableCount">共 0 条</span>
        <div class="filter-group" style="margin:0">
          <label>显示条数：</label>
          <select id="pageSize" style="min-width:80px;padding:4px 8px;font-size:12px;border:1px solid var(--border);border-radius:6px;cursor:pointer;">
            <option value="50">50</option>
            <option value="100">100</option>
            <option value="200">200</option>
            <option value="500" selected>500</option>
            <option value="1000">1000</option>
            <option value="all">全部</option>
          </select>
        </div>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索货品ID/名称/部门/计划员/采购员...">
        <button class="export-btn" id="exportBtn">📥 导出CSV</button>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr id="tableHead"></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

/* ---------- File Upload Handling ---------- */
function onFileSelected(inputId, displayId) {
  const file = document.getElementById(inputId).files[0];
  const display = document.getElementById(displayId);
  if (file) {
    display.textContent = '✅ 已选择：' + file.name + '（' + (file.size/1024).toFixed(1) + ' KB）';
  } else {
    display.textContent = '';
  }
}

function readExcelFile(file) {
  return new Promise(function(resolve, reject) {
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, {type: 'array'});
        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];
        const jsonData = XLSX.utils.sheet_to_json(sheet, {defval: ''});
        resolve(jsonData);
      } catch(err) {
        reject(err);
      }
    };
    reader.onerror = function() { reject(new Error('文件读取失败')); };
    reader.readAsArrayBuffer(file);
  });
}

async function processFiles() {
  const fileInput = document.getElementById('fileInput');
  if (!fileInput.files[0]) {
    alert('请先选择保管账库存Excel文件');
    return;
  }

  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.textContent = '⏳ 处理中...';

  try {
    // Read main data
    setProgress('正在读取保管账库存数据...');
    const records = await readExcelFile(fileInput.files[0]);

    // Process data using embedded mapping
    setProgress('正在处理数据（计算失效天数、在库天数、匹配计划员/采购员...）');
    const processed = processInventoryData(records, EMBEDDED_MAPPING);

    // Store globally
    DATA = processed;

    // Switch to dashboard view
    document.getElementById('uploadArea').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    // Initialize dashboard
    initDashboard();

  } catch(err) {
    alert('处理失败：' + err.message);
    btn.disabled = false;
    btn.textContent = '📊 生成看板';
  }
}

/* ---------- Data Processing ---------- */
function formatDate(val) {
  var d = parseDate(val);
  if (!d) return val || '';
  var y = d.getFullYear();
  var m = String(d.getMonth() + 1).padStart(2, '0');
  var day = String(d.getDate()).padStart(2, '0');
  return y + '-' + m + '-' + day;
}

function parseDate(val) {
  if (!val) return null;
  if (val instanceof Date) return val;
  if (typeof val === 'number') {
    // Excel serial date
    const excelEpoch = new Date(1899, 11, 30);
    return new Date(excelEpoch.getTime() + val * 86400000);
  }
  if (typeof val === 'string') {
    // Try common formats
    const s = val.trim();
    // Handle "2026-01-15" or "2026/01/15"
    const d = new Date(s);
    if (!isNaN(d.getTime())) return d;
    // Handle Excel date string like "45723"
    const num = parseFloat(s);
    if (!isNaN(num)) {
      const excelEpoch = new Date(1899, 11, 30);
      return new Date(excelEpoch.getTime() + num * 86400000);
    }
  }
  return null;
}

function processInventoryData(records, mapping) {
  const today = new Date();
  today.setHours(0, 0, 0, 0);

  // Build mapping lookup from embedded data {id: [dept, planner, buyer]}
  const mappingLookup = {};
  if (mapping && typeof mapping === 'object') {
    Object.keys(mapping).forEach(function(id) {
      var arr = mapping[id];
      mappingLookup[id] = {
        '产品部门': arr[0] || '',
        '计划员': arr[1] || '',
        '采购员': arr[2] || ''
      };
    });
  }

  // Process records
  const processed = [];
  const stores = new Set();

  records.forEach(function(r) {
    const row = {};
    // Copy all fields
    Object.keys(r).forEach(function(k) { row[k] = r[k]; });

    // Parse dates and format for display
    const expDate = parseDate(r['有效期']);
    const prodDate = parseDate(r['生产日期']);
    row['有效期'] = formatDate(r['有效期']);
    row['生产日期'] = formatDate(r['生产日期']);

    // Calculate 距离失效天数
    if (expDate) {
      const diff = expDate.getTime() - today.getTime();
      row['距离失效天数'] = Math.floor(diff / 86400000);
    } else {
      row['距离失效天数'] = null;
    }

    // Calculate 在库天数 (use 入库日期 if available, else 生产日期)
    const inDate = parseDate(r['入库日期']) || prodDate;
    if (inDate) {
      const diff = today.getTime() - inDate.getTime();
      row['在库天数'] = Math.floor(diff / 86400000);
    } else {
      row['在库天数'] = null;
    }

    // Categorize 距离失效分类
    const ed = row['距离失效天数'];
    if (ed === null || ed === '') row['距离失效分类'] = '';
    else if (ed < 0) row['距离失效分类'] = '已过期';
    else if (ed <= 30) row['距离失效分类'] = '1个月内';
    else if (ed <= 90) row['距离失效分类'] = '1-3个月';
    else if (ed <= 180) row['距离失效分类'] = '3-6个月';
    else row['距离失效分类'] = '6个月以上';

    // Categorize 在库天数分类
    const sd = row['在库天数'];
    if (sd === null || sd === '') row['在库天数分类'] = '';
    else if (sd <= 30) row['在库天数分类'] = '1个月内';
    else if (sd <= 90) row['在库天数分类'] = '1-3个月';
    else if (sd <= 180) row['在库天数分类'] = '3-6个月';
    else row['在库天数分类'] = '6个月以上';

    // Calculate 品种价格参考
    const price = parseFloat(r['零售价']) || 0;
    const qty = parseFloat(r['数量']) || 0;
    row['品种价格参考'] = Math.round(price * qty * 100) / 100;

    // Merge mapping - try both string and numeric match
    const rawItemId = r['货品ID'] || r['货品id'] || '';
    const itemId = String(rawItemId).trim();
    let matched = false;
    if (mappingLookup[itemId]) {
      row['产品部门'] = mappingLookup[itemId]['产品部门'] || r['产品部门'] || '';
      row['计划员'] = mappingLookup[itemId]['计划员'] || r['计划员'] || '';
      row['采购员'] = mappingLookup[itemId]['采购员'] || r['采购员'] || '';
      matched = true;
    }
    // Also try integer match (e.g., "9.0" -> "9")
    const itemIdInt = String(parseInt(rawItemId)).trim();
    if (!matched && mappingLookup[itemIdInt]) {
      row['产品部门'] = mappingLookup[itemIdInt]['产品部门'] || r['产品部门'] || '';
      row['计划员'] = mappingLookup[itemIdInt]['计划员'] || r['计划员'] || '';
      row['采购员'] = mappingLookup[itemIdInt]['采购员'] || r['采购员'] || '';
      matched = true;
    }
    if (!matched) {
      row['产品部门'] = r['产品部门'] || '';
      row['计划员'] = r['计划员'] || '';
      row['采购员'] = r['采购员'] || '';
    }

    // Track stores
    if (r['保管账']) stores.add(String(r['保管账']));

    processed.push(row);
  });

  // Build summary
  const summary = {
    stores: Array.from(stores).sort(),
    dataDate: today.toISOString().split('T')[0],
    expireStats: {},
    storageStats: {},
    deptStats: {}
  };

  // Build expire stats
  EXPIRE_ORDER.forEach(function(k) { summary.expireStats[k] = {count:0, qty:0}; });
  processed.forEach(function(r) {
    const k = r['距离失效分类'];
    if (summary.expireStats[k]) {
      summary.expireStats[k].count++;
      summary.expireStats[k].qty += (parseFloat(r['数量']) || 0);
    }
  });

  // Build storage stats
  STORAGE_ORDER.forEach(function(k) { summary.storageStats[k] = {count:0, qty:0}; });
  processed.forEach(function(r) {
    const k = r['在库天数分类'];
    if (summary.storageStats[k]) {
      summary.storageStats[k].count++;
      summary.storageStats[k].qty += (parseFloat(r['数量']) || 0);
    }
  });

  return {records: processed, summary: summary};
}

/* ---------- Dashboard Initialization ---------- */
function initDashboard() {
  document.getElementById('headerDate').textContent = '数据日期：' + DATA.summary.dataDate + ' | ' + DATA.summary.stores.join('、');
  initFilters();
  buildTableHead();
  render();
}

function initFilters() {
  // Store filter
  const sel = document.getElementById('storeFilter');
  DATA.summary.stores.forEach(function(s) {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = s;
    sel.appendChild(opt);
  });

  // Populate 计划员, 采购员, 产品部门
  var planners = {}, buyers = {}, depts = {};
  DATA.records.forEach(function(r) {
    var p = r['计划员']; if (p) planners[p] = 1;
    var b = r['采购员']; if (b) buyers[b] = 1;
    var d = r['产品部门']; if (d) depts[d] = 1;
  });
  var plannerArr = Object.keys(planners).sort(function(a,b){return a.localeCompare(b,'zh-CN');});
  var buyerArr = Object.keys(buyers).sort(function(a,b){return a.localeCompare(b,'zh-CN');});
  var deptArr = Object.keys(depts).sort(function(a,b){return a.localeCompare(b,'zh-CN');});

  function fillSelect(id, arr) {
    var sel2 = document.getElementById(id);
    arr.forEach(function(v) {
      var opt2 = document.createElement('option');
      opt2.value = v; opt2.textContent = v;
      sel2.appendChild(opt2);
    });
  }
  fillSelect('plannerFilter', plannerArr);
  fillSelect('buyerFilter', buyerArr);
  fillSelect('deptFilter', deptArr);
}

/* ---------- Table Head & Column Resize ---------- */
function buildTableHead() {
  const tr = document.getElementById('tableHead');
  let html = '';
  COLUMNS.forEach(function(col) {
    html += '<th data-key="'+col.key+'" data-type="'+col.type+'">';
    html += col.label + '<span class="sort-arrow">⇅</span>';
    html += '<span class="resize-handle"></span>';
    html += '</th>';
  });
  tr.innerHTML = html;

  // Sort click
  tr.querySelectorAll('th').forEach(function(th) {
    th.addEventListener('click', function(e) {
      if (e.target.classList.contains('resize-handle')) return;
      const key = th.dataset.key;
      if (sortCol === key) {
        sortDir = sortDir === 'asc' ? 'desc' : sortDir === 'desc' ? '' : 'asc';
      } else {
        sortCol = key;
        sortDir = 'asc';
      }
      tr.querySelectorAll('th').forEach(function(t) {
        t.classList.remove('sort-asc','sort-desc');
        t.querySelector('.sort-arrow').textContent = '⇅';
      });
      if (sortDir) {
        th.classList.add('sort-'+sortDir);
        th.querySelector('.sort-arrow').textContent = sortDir === 'asc' ? '▲' : '▼';
      }
      renderTable();
    });
  });

  // Column resize
  var handles = tr.querySelectorAll('.resize-handle');
  handles.forEach(function(handle) {
    handle.addEventListener('mousedown', function(e) {
      e.preventDefault(); e.stopPropagation();
      var th = handle.parentElement;
      var startX = e.pageX;
      var startWidth = th.offsetWidth;
      handle.classList.add('resizing');
      document.body.style.cursor = 'col-resize';
      function onMove(ev) {
        var diff = ev.pageX - startX;
        var newWidth = Math.max(50, startWidth + diff);
        th.style.width = newWidth + 'px';
        th.style.minWidth = newWidth + 'px';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        handle.classList.remove('resizing');
        document.body.style.cursor = '';
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

/* ---------- Filtering & Rendering ---------- */
function getActiveChip(groupId) {
  const el = document.getElementById(groupId);
  const active = el.querySelector('.chip.active');
  return active ? active.dataset.val : 'all';
}

function getFiltered() {
  let records = DATA.records;
  const store = document.getElementById('storeFilter').value;
  if (store !== 'all') records = records.filter(function(r){ return r['保管账'] === store; });

  const expireVal = getActiveChip('expireChips');
  if (expireVal !== 'all') records = records.filter(function(r){ return r['距离失效分类'] === expireVal; });

  const storageVal = getActiveChip('storageChips');
  if (storageVal !== 'all') records = records.filter(function(r){ return r['在库天数分类'] === storageVal; });

  const deptVal = document.getElementById('deptFilter').value;
  if (deptVal !== 'all') records = records.filter(function(r){ return r['产品部门'] === deptVal; });

  const plannerVal = document.getElementById('plannerFilter').value;
  if (plannerVal !== 'all') records = records.filter(function(r){ return r['计划员'] === plannerVal; });

  const buyerVal = document.getElementById('buyerFilter').value;
  if (buyerVal !== 'all') records = records.filter(function(r){ return r['采购员'] === buyerVal; });

  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  if (search) records = records.filter(function(r){
    return (r['货品通用名']||'').toLowerCase().indexOf(search) >= 0 ||
           (r['货品ID']||'').toLowerCase().indexOf(search) >= 0 ||
           (r['产品部门']||'').toLowerCase().indexOf(search) >= 0 ||
           (r['计划员']||'').toLowerCase().indexOf(search) >= 0 ||
           (r['采购员']||'').toLowerCase().indexOf(search) >= 0;
  });

  return records;
}

function sortRecords(recs) {
  if (!sortCol || !sortDir) return recs;
  const col = COLUMNS.find(function(c){ return c.key === sortCol; });
  if (!col) return recs;
  const dir = sortDir === 'asc' ? 1 : -1;
  return recs.slice().sort(function(a, b) {
    let va = a[sortCol], vb = b[sortCol];
    if (va == null && vb == null) return 0;
    if (va == null) return 1;
    if (vb == null) return -1;
    if (col.type === 'number') {
      va = parseFloat(va) || 0; vb = parseFloat(vb) || 0;
      return (va - vb) * dir;
    }
    if (col.type === 'date') {
      va = new Date(va).getTime() || 0; vb = new Date(vb).getTime() || 0;
      return (va - vb) * dir;
    }
    va = String(va); vb = String(vb);
    return va.localeCompare(vb, 'zh-CN') * dir;
  });
}

function render() {
  filteredRecords = getFiltered();
  renderStats();
  renderCharts();
  renderTable();
}

var filteredRecords = [];

function formatWan(val) {
  if (val >= 100000000) return (val/100000000).toFixed(2)+'亿';
  if (val >= 10000) return (val/10000).toFixed(1)+'万';
  return val.toLocaleString();
}

function renderStats() {
  const recs = filteredRecords;
  const total = recs.length;
  const totalQty = recs.reduce(function(s,r){ return s + (parseFloat(r['数量'])||0); }, 0);
  const totalValue = recs.reduce(function(s,r){ return s + (r['品种价格参考']||0); }, 0);
  const expiredCount = recs.filter(function(r){ return r['距离失效分类'] === '已过期' || r['距离失效分类'] === '1个月内'; }).length;
  const longStorage = recs.filter(function(r){ return r['在库天数分类'] === '6个月以上'; }).length;

  const stats = [
    {label:'总品种数', value:total.toLocaleString(), color:'var(--accent)'},
    {label:'总库存量', value:formatWan(totalQty), color:'var(--accent2)'},
    {label:'库存金额参考', value:'¥'+formatWan(totalValue), color:'#0d47a1'},
    {label:'近效期品种', value:expiredCount.toLocaleString(), color:'var(--red)'},
    {label:'长期库存品种', value:longStorage.toLocaleString(), color:'var(--orange)'},
  ];

  document.getElementById('statsRow').innerHTML = stats.map(function(s){
    return '<div class="stat-card"><div class="value" style="color:'+s.color+'">'+s.value+'</div><div class="label">'+s.label+'</div></div>';
  }).join('');
}

function renderCharts() {
  const recs = filteredRecords;

  // Expire chart data
  var expireData = {};
  EXPIRE_ORDER.forEach(function(k){ expireData[k] = {count:0, qty:0}; });
  recs.forEach(function(r){
    var k = r['距离失效分类'];
    if (expireData[k]) { expireData[k].count++; expireData[k].qty += (parseFloat(r['数量'])||0); }
  });

  if (expireChart) expireChart.destroy();
  expireChart = new Chart(document.getElementById('expireChart'), {
    type:'bar',
    data:{
      labels: EXPIRE_ORDER,
      datasets:[
        {label:'品种数', data:EXPIRE_ORDER.map(function(k){return expireData[k].count;}), backgroundColor:EXPIRE_ORDER.map(function(k){return EXPIRE_COLORS[k]+'88';}), borderColor:EXPIRE_ORDER.map(function(k){return EXPIRE_COLORS[k];}), borderWidth:1.5, borderRadius:4, yAxisID:'y', order:2},
        {label:'库存量', data:EXPIRE_ORDER.map(function(k){return expireData[k].qty;}), backgroundColor:EXPIRE_ORDER.map(function(k){return EXPIRE_COLORS[k]+'33';}), borderColor:EXPIRE_ORDER.map(function(k){return EXPIRE_COLORS[k];}), borderWidth:1.5, borderRadius:4, yAxisID:'y1', order:1}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#5a6f84',font:{size:11}}},
        tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.y.toLocaleString();}}},
        datalabels:false
      },
      scales:{
        x:{ticks:{color:'#5a6f84',font:{size:11}},grid:{color:'#e8eef5'}},
        y:{type:'linear',position:'left',beginAtZero:true,ticks:{color:'#5a6f84',font:{size:10}},grid:{color:'#e8eef5'},title:{display:true,text:'品种数',color:'#5a6f84',font:{size:11}}},
        y1:{type:'linear',position:'right',beginAtZero:true,ticks:{color:'#5a6f84',font:{size:10},callback:function(v){if(v>=10000)return (v/10000).toFixed(0)+'万'; return v.toLocaleString();}},grid:{drawOnChartArea:false},title:{display:true,text:'库存量',color:'#5a6f84',font:{size:11}}}
      },
      onClick:function(evt, elements) {
        if (elements.length > 0) {
          var idx = elements[0].index;
          var label = EXPIRE_ORDER[idx];
          setChipActive('expireChips', label);
          render();
        }
      }
    },
    plugins:[{
      id:'barLabels',
      afterDatasetsDraw:function(chart) {
        var ctx = chart.ctx;
        chart.data.datasets.forEach(function(ds, di) {
          var meta = chart.getDatasetMeta(di);
          if (meta.hidden) return;
          meta.data.forEach(function(bar, index) {
            var val = ds.data[index];
            if (!val) return;
            var text = val >= 10000 ? (val/10000).toFixed(1)+'万' : val.toLocaleString();
            ctx.save();
            ctx.fillStyle = '#5a6f84';
            ctx.font = '10px Segoe UI,Microsoft YaHei,sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(text, bar.x, bar.y - 4);
            ctx.restore();
          });
        });
      }
    }]
  });

  // Storage chart data
  var storageData = {};
  STORAGE_ORDER.forEach(function(k){ storageData[k] = {count:0, qty:0}; });
  recs.forEach(function(r){
    var k = r['在库天数分类'];
    if (storageData[k]) { storageData[k].count++; storageData[k].qty += (parseFloat(r['数量'])||0); }
  });

  if (storageChart) storageChart.destroy();
  storageChart = new Chart(document.getElementById('storageChart'), {
    type:'bar',
    data:{
      labels: STORAGE_ORDER,
      datasets:[
        {label:'品种数', data:STORAGE_ORDER.map(function(k){return storageData[k].count;}), backgroundColor:STORAGE_ORDER.map(function(k){return STORAGE_COLORS[k]+'88';}), borderColor:STORAGE_ORDER.map(function(k){return STORAGE_COLORS[k];}), borderWidth:1.5, borderRadius:4, yAxisID:'y', order:2},
        {label:'库存量', data:STORAGE_ORDER.map(function(k){return storageData[k].qty;}), backgroundColor:STORAGE_ORDER.map(function(k){return STORAGE_COLORS[k]+'33';}), borderColor:STORAGE_ORDER.map(function(k){return STORAGE_COLORS[k];}), borderWidth:1.5, borderRadius:4, yAxisID:'y1', order:1}
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{labels:{color:'#5a6f84',font:{size:11}}},
        tooltip:{callbacks:{label:function(ctx){return ctx.dataset.label+': '+ctx.parsed.y.toLocaleString();}}},
        datalabels:false
      },
      scales:{
        x:{ticks:{color:'#5a6f84',font:{size:11}},grid:{color:'#e8eef5'}},
        y:{type:'linear',position:'left',beginAtZero:true,ticks:{color:'#5a6f84',font:{size:10}},grid:{color:'#e8eef5'},title:{display:true,text:'品种数',color:'#5a6f84',font:{size:11}}},
        y1:{type:'linear',position:'right',beginAtZero:true,ticks:{color:'#5a6f84',font:{size:10},callback:function(v){if(v>=10000)return (v/10000).toFixed(0)+'万'; return v.toLocaleString();}},grid:{drawOnChartArea:false},title:{display:true,text:'库存量',color:'#5a6f84',font:{size:11}}}
      },
      onClick:function(evt, elements) {
        if (elements.length > 0) {
          var idx = elements[0].index;
          var label = STORAGE_ORDER[idx];
          setChipActive('storageChips', label);
          render();
        }
      }
    },
    plugins:[{
      id:'barLabels2',
      afterDatasetsDraw:function(chart) {
        var ctx = chart.ctx;
        chart.data.datasets.forEach(function(ds, di) {
          var meta = chart.getDatasetMeta(di);
          if (meta.hidden) return;
          meta.data.forEach(function(bar, index) {
            var val = ds.data[index];
            if (!val) return;
            var text = val >= 10000 ? (val/10000).toFixed(1)+'万' : val.toLocaleString();
            ctx.save();
            ctx.fillStyle = '#5a6f84';
            ctx.font = '10px Segoe UI,Microsoft YaHei,sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(text, bar.x, bar.y - 4);
            ctx.restore();
          });
        });
      }
    }]
  });
}

function setChipActive(groupId, value) {
  var el = document.getElementById(groupId);
  el.querySelectorAll('.chip').forEach(function(c) {
    c.classList.remove('active');
    if (c.dataset.val === value) c.classList.add('active');
  });
}

function getExpireBadgeClass(cat) {
  if (cat === '已过期' || cat === '1个月内') return 'badge badge-1m';
  if (cat === '1-3个月') return 'badge badge-1-3m';
  if (cat === '3-6个月') return 'badge badge-3-6m';
  return 'badge badge-6m';
}

function getStorageBadgeClass(cat) {
  if (cat === '1个月内') return 'badge badge-storage-1m';
  if (cat === '1-3个月') return 'badge badge-storage-1-3m';
  if (cat === '3-6个月') return 'badge badge-storage-3-6m';
  return 'badge badge-storage-6m';
}

function renderTable() {
  var recs = sortRecords(filteredRecords);
  document.getElementById('tableCount').textContent = '共 ' + recs.length + ' 条';
  var tbody = document.getElementById('tableBody');
  var pageSizeVal = document.getElementById('pageSize').value;
  var limit = pageSizeVal === 'all' ? recs.length : parseInt(pageSizeVal);
  var display = recs.slice(0, limit);

  // Compute summary
  var sumQty = 0, sumValue = 0;
  for (var si = 0; si < recs.length; si++) {
    sumQty += (parseFloat(recs[si]['数量']) || 0);
    sumValue += (recs[si]['品种价格参考'] || 0);
  }

  var html = '';
  for (var i = 0; i < display.length; i++) {
    var r = display[i];
    html += '<tr>';
    for (var j = 0; j < COLUMNS.length; j++) {
      var col = COLUMNS[j];
      var val = r[col.key];
      var td = '';

      if (col.type === 'badge_expire') {
        td = '<span class="'+getExpireBadgeClass(val)+'">'+(val||'')+'</span>';
      } else if (col.type === 'badge_storage') {
        td = val ? '<span class="'+getStorageBadgeClass(val)+'">'+val+'</span>' : '';
      } else if (col.type === 'number') {
        if (val != null) {
          var numVal = parseFloat(val);
          if (col.key === '零售价') {
            td = '¥' + numVal.toFixed(2);
          } else if (col.key === '品种价格参考') {
            td = '<span class="price-ref">¥' + formatWan(numVal) + '</span>';
          } else {
            td = Number.isInteger(numVal) ? numVal.toLocaleString() : numVal.toLocaleString(undefined,{maximumFractionDigits:2});
          }
        }
        html += '<td style="text-align:right">' + td + '</td>';
        continue;
      } else {
        td = val || '';
      }
      html += '<td>' + td + '</td>';
    }
    html += '</tr>';
  }

  if (pageSizeVal !== 'all' && recs.length > limit) {
    html += '<tr><td colspan="'+COLUMNS.length+'" style="text-align:center;color:var(--text2);padding:12px">仅显示前'+limit+'条，共'+recs.length+'条记录（可调整显示条数）</td></tr>';
  }

  // Summary row
  html += '<tr class="summary-row">';
  for (var j = 0; j < COLUMNS.length; j++) {
    var col = COLUMNS[j];
    if (col.key === '货品ID') {
      html += '<td style="text-align:center">汇总</td>';
    } else if (col.key === '数量') {
      html += '<td style="text-align:right">'+sumQty.toLocaleString()+'</td>';
    } else if (col.key === '品种价格参考') {
      html += '<td style="text-align:right"><span class="price-ref">¥'+formatWan(sumValue)+'</span></td>';
    } else if (col.type === 'number') {
      html += '<td></td>';
    } else {
      html += '<td></td>';
    }
  }
  html += '</tr>';

  tbody.innerHTML = html;
}

/* ---------- Event Listeners ---------- */
document.addEventListener('DOMContentLoaded', function() {
  // Chip click handlers
  document.querySelectorAll('.chip-group').forEach(function(group) {
    group.addEventListener('click', function(e) {
      if (e.target.classList.contains('chip')) {
        group.querySelectorAll('.chip').forEach(function(c) { c.classList.remove('active'); });
        e.target.classList.add('active');
        if (DATA) render();
      }
    });
  });

  document.getElementById('storeFilter').addEventListener('change', function() { if (DATA) render(); });
  document.getElementById('searchInput').addEventListener('input', function() { if (DATA) render(); });
  document.getElementById('deptFilter').addEventListener('change', function() { if (DATA) render(); });
  document.getElementById('plannerFilter').addEventListener('change', function() { if (DATA) render(); });
  document.getElementById('buyerFilter').addEventListener('change', function() { if (DATA) render(); });
  document.getElementById('pageSize').addEventListener('change', function() { if (DATA) renderTable(); });

  // Export CSV
  document.getElementById('exportBtn').addEventListener('click', function() {
    if (!DATA) return;
    var headers = COLUMNS.map(function(c){ return c.label; });
    var keys = COLUMNS.map(function(c){ return c.key; });
    var rows = sortRecords(filteredRecords).map(function(r) {
      return keys.map(function(k) {
        var v = r[k];
        return v != null ? String(v).replace(/"/g,'""') : '';
      });
    });
    var csv = '\uFEFF' + [headers.join(','), ...rows.map(function(r){ return r.join(','); })].join('\n');
    var blob = new Blob([csv], {type:'text/csv;charset=utf-8'});
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '保管账库存_筛选结果.csv';
    a.click();
  });
});
